version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kaloko-frontend
    ports:
      - "4200:4200"
    volumes:
      - .:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: bash -c "npm install && ng-serve"
    restart: always
