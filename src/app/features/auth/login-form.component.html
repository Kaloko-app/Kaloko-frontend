<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
  @if (errorMessage()) {
    <div class="rounded-md bg-red-900/50 p-4 mb-6 border border-red-500">
      <div class="flex">
        <div class="ml-3">
          <h3 class="text-sm font-medium text-red-200">
            {{ errorMessage() }}
          </h3>
        </div>
      </div>
    </div>
  }
  
  <div>
    <label for="username" class="block text-sm font-medium text-text-muted">
      Username or Email address
    </label>
    <div class="mt-1">
      <input
        id="username"
        type="text"
        formControlName="username"
        autocomplete="username"
        required
        class="appearance-none block w-full px-3 py-2 border border-gray-600 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm bg-background text-text-main"
      />
    </div>
  </div>

  <div>
    <label for="password" class="block text-sm font-medium text-text-muted">
      Password
    </label>
    <div class="mt-1">
      <input
        id="password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        required
        class="appearance-none block w-full px-3 py-2 border border-gray-600 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm bg-background text-text-main"
      />
    </div>
  </div>

  <div>
    <button
      type="submit"
      [disabled]="form.invalid"
      class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-emerald-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
    >
      Sign in
    </button>
  </div>
</form>
